    <script>
        const button = document.getElementById('TheFuckingButton');
        const text = "click to enter";
        let i = 0;
        const video = document.getElementById('videoBackground');
        const audio = document.getElementById('TheFuckingBackGroundMusic');
        function typeText() {
            if (i < text.length) {
                button.textContent += text.charAt(i);
                i++;
                setTimeout(typeText, 100);

        typeText();

        .log-entry {

    <script>
        document.getElementById('cashappBtn').onclick = function() {

    </div>
    <div class="blur-overlay"></div>
    <script>
        const purchaseBtn = document.getElementById('purchaseBtn');
        const modal = document.getElementById('paymentModal');
        const closeBtn = document.getElementsByClassName('close')[0];
        const loginBtn = document.getElementById('loginBtn');
        const blurOverlay = document.querySelector('.blur-overlay');

        purchaseBtn.onclick = function() {
            modal.style.display = "block";
        }

        closeBtn.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        loginBtn.addEventListener('click', () => {
            blurOverlay.textContent = "checking invite";
            blurOverlay.style.display = "flex";
            
            setTimeout(() => {
                blurOverlay.textContent = "incorrect invite key";
                setTimeout(() => {
                    blurOverlay.style.display = "none";
                }, 1000);
            }, 3000);
        });

        interact('.panel').draggable({
            inertia: true,
            modifiers: [
                interact.modifiers.restrictRect({
                    restriction: 'parent',
                    endOnly: true
                })
            ],
            autoScroll: true,
            listeners: {
                move(event) {
                    const target = event.target;
                    const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

                    target.style.transform = `translate(${x}px, ${y}px)`;
                    target.setAttribute('data-x', x);
                    target.setAttribute('data-y', y);
                }
            }
        });

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.style.backgroundColor = 'rgba(0, 255, 170, 0.2)';
            });

            input.addEventListener('blur', () => {
                input.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
            });
        });

        // Chat feature
        const sendMessageBtn = document.getElementById('send-message');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        sendMessageBtn.addEventListener('click', () => {
            const message = chatInput.value;
            if (message) {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('chat-message');
                messageDiv.textContent = message;
                chatMessages.appendChild(messageDiv);
                chatInput.value = '';
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessageBtn.click();
            }
        });
    </script>
